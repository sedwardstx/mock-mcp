root_cause:
  category: network
  summary: >-
    A recently added NSG deny rule blocks outbound TCP 1433, dropping the
    application's connections to the backend database.
  resolution: >-
    Amend the NSG rule to allow outbound TCP 1433 to the database subnet (or
    reorder rules so the allow precedes the deny).
investigation_path:
  - order: 1
    tool: query_network_logs
    params:
      time_range: "2026-06-02T14:00:00Z/2026-06-02T15:00:00Z"
    reveals: "Outbound TCP 1433 flows with Action=Deny matching the new NSG rule."
